<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hjemmelager</title>

<style>
body { font-family: system-ui; background:#f5f5f5; margin:0; padding:16px; }
input, select, button, textarea { width:100%; padding:10px; margin-bottom:10px; font-size:16px; }
button { background:black; color:white; border:none; border-radius:6px; }
.row { display:flex; gap:8px; }
.row button { width:auto; }
.item { background:white; padding:12px; border-radius:6px; margin-bottom:10px; }
.muted { color:#666; }
.hidden { display:none; }
img { max-width:100%; border-radius:6px; margin-top:8px; }
</style>
</head>

<body>

<h1>Hjemmelager</h1>

<input id="search" placeholder="Søk i lager"/>

<h3>Legg til vare</h3>
<input id="navn" placeholder="Navn"/>
<input id="type" placeholder="Type"/>
<input id="lokasjon" placeholder="Lokasjon"/>
<input id="hylle" placeholder="Hylle"/>
<input id="boks" placeholder="Boks"/>
<input id="dato" placeholder="Dato"/>

<div class="row">
<button onclick="changeAntall(-1)">➖</button>
<input id="antall" placeholder="Antall"/>
<button onclick="changeAntall(1)">➕</button>
</div>

<input id="pris" placeholder="Pris"/>

<input type="file" id="bilde" accept="image/*"/>

<button onclick="addItem()">Lagre</button>

<h3>Lager</h3>
<div id="list"></div>

<script>
const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');

let items = JSON.parse(localStorage.getItem('items') || '[]');
let editIndex = null;

/* ---------- BILDEKOMPRESJON ---------- */
function compressImage(file){
  return new Promise(resolve => {
    const reader = new FileReader();

    reader.onload = e => {
      const img = new Image();
      img.src = e.target.result;

      img.onload = () => {
        const canvas = document.createElement('canvas');

        const maxWidth = 600;
        const scale = maxWidth / img.width;

        canvas.width = maxWidth;
        canvas.height = img.height * scale;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        const compressed = canvas.toDataURL('image/jpeg', 0.7);
        resolve(compressed);
      };
    };

    reader.readAsDataURL(file);
  });
}

/* ---------- ADD ITEM ---------- */
async function addItem(){
  const file = document.getElementById('bilde').files[0];

  let imageData = '';

  if(file){
    imageData = await compressImage(file);
  }

  const item = {
    navn: navn.value,
    type: type.value,
    lokasjon: lokasjon.value,
    hylle: hylle.value,
    boks: boks.value,
    dato: dato.value,
    antall: antall.value,
    pris: pris.value,
    bilde: imageData
  };

  if(!item.navn) return alert('Navn mangler');

  if(editIndex !== null){
    items[editIndex] = item;
    editIndex = null;
  } else {
    items.push(item);
  }

  localStorage.setItem('items', JSON.stringify(items));

  clearForm();
  render();
}

/* ---------- RENDER ---------- */
function render(){
  const q = searchEl.value.toLowerCase();
  listEl.innerHTML = '';

  items
    .filter(i => Object.values(i).some(v => String(v).toLowerCase().includes(q)))
    .forEach((i,index)=>{

      const d = document.createElement('div');
      d.className = 'item';

      d.innerHTML = `
        <b>${i.navn}</b> <span class="muted">(${i.type||''})</span><br>
        ${i.bilde ? `<img src="${i.bilde}">` : ''}
        <span class="muted">${i.lokasjon||''} - Hylle ${i.hylle||''}, Boks ${i.boks||''}</span><br>
        Antall: ${i.antall||''} | Pris: ${i.pris||''}<br><br>
        <button onclick="editItem(${index})">Rediger</button>
        <button onclick="deleteItem(${index})">Slett</button>
      `;

      listEl.appendChild(d);
    });
}

/* ---------- EDIT ---------- */
function editItem(index){
  const i = items[index];

  navn.value = i.navn;
  type.value = i.type;
  lokasjon.value = i.lokasjon;
  hylle.value = i.hylle;
  boks.value = i.boks;
  dato.value = i.dato;
  antall.value = i.antall;
  pris.value = i.pris;

  editIndex = index;
  window.scrollTo({top:0});
}

/* ---------- DELETE ---------- */
function deleteItem(index){
  if(!confirm('Slette?')) return;

  items.splice(index,1);
  localStorage.setItem('items', JSON.stringify(items));
  render();
}

/* ---------- CLEAR ---------- */
function clearForm(){
  document.querySelectorAll('input').forEach(i=>{
    if(i.type !== 'file') i.value = '';
  });

  document.getElementById('bilde').value = '';
}

/* ---------- ANTALL ---------- */
function changeAntall(d){
  antall.value = Math.max(0, Number(antall.value||0)+d);
}

/* ---------- SEARCH ---------- */
searchEl.addEventListener('input', render);

/* ---------- INIT ---------- */
render();
</script>

</body>
</html>
